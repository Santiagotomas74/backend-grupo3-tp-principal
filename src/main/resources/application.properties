spring.application.name=hytrac
server.port=8080

# The file 'database.db' will be created in your project root automatically
spring.datasource.url=jdbc:sqlite:database.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# This tells Hibernate how to write SQL that SQLite understands
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# 'update' means it will create tables if they don't exist, 
# but won't delete your data when you restart the app.
spring.jpa.hibernate.ddl-auto=update

# Optional: See the SQL queries in your console (helpful for debugging)
# spring.jpa.show-sql=true

# Default profile (usually dev for local work)
spring.profiles.active=dev